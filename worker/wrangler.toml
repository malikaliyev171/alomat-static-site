name = "xabar"
main = "src/index.js"
compatibility_date = "2026-07-10"

[assets]
directory = "../dist"
binding = "ASSETS"
run_worker_first = ["/api/*"]

[[routes]]
pattern = "alomat.ai"
custom_domain = true

[[d1_databases]]
binding = "DB"
database_name = "alomat_signals"
database_id = "724e2c5c-ee13-42e0-90b6-eea1bdba1033"
migrations_dir = "migrations"
